spring:
  application:
    name: LibraryAPI
  cache:
    type: none
  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:mem:librarydb
    username: testuser
    password: testpass
    driverClassName: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  cloud:
    vault:
      enabled: false